<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WEB Estoques</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="icon" href="../img/Caixa1.png" />
  </head>
  <body>
    <header>
      <img src="./img/Caixa1.png" alt="Um cubo Marrom simbolizando uma caixa" />
      <h1>WEB Estoques</h1>
      <nav>
        <a href="./estoque.html">
          <button>Estoque</button>
        </a>
        <a href="./usuarios.html">
          <button>Usuarios</button>
        </a>
        <button>Contato</button>
      </nav>
    </header>

    <main>
      <section>
        <h2 class="nomeUsuario">admin</h2>
        <button class="sairUsuario">Sair</button>
        <hr />
        <p>Gerenciar Estoque</p>
        <form action="" class="form-peaquisar">
          <input
            type="text"
            placeholder="Pesquisar Produto"
            class="input-pesquisa"
          />
          <input type="submit" value="Pesquisar" />
        </form>
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Nome</th>
              <th>Quantidade</th>
            </tr>
          </thead>
          <tbody class="TabelaProdutos"></tbody>
        </table>
        <hr />
        <button class="botaoAdicionar">Adicionar</button>
        <form class="form-adicionar esconder">
          <input
            type="text"
            placeholder="Adicionar Produto"
            class="input-nome"
          />
          <input
            type="number"
            placeholder="Adicionar Quantidade"
            class="input-quantidade"
          />
          <input type="submit" value="Adicionar" />
        </form>
      </section>
    </main>

    <footer class="esconder">
      <p>🄯teste</p>
    </footer>
    <script src="./js/checkLogin.js"></script>
    <script src="./js/produtos.js"></script>
  </body>
</html>
