<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WEB Estoques</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="css/login.css" />
    <link rel="icon" href="../img/Caixa1.png" />
  </head>
  <body>
    <header>
      <img src="./img/Caixa1.png" alt="Um cubo Marrom simbolizando uma caixa" />
      <h1>WEB Estoques</h1>
    </header>

    <main>
      <section class="container">
        <h2>Login</h2>
        <form action="" class="telaLogin">
          <label for="input-nomeLogin">Nome Usuario:</label>
          <input type="text" class="input-nomeLogin" />
          <label for="input-senhaLogin">Senha:</label>
          <input type="password" class="input-senhaLogin" />
          <input type="submit" value="Login" />
        </form>
      </section>
    </main>

    <footer class="esconder">
      <p>🄯teste</p>
    </footer>
    <script src="./js/checkLogin.js"></script>
    <script src="./js/usuarios.js"></script>
  </body>
</html>
